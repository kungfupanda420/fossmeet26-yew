# Trunk.toml

[build]
target = "index.html"
dist = "dist"
release = true
wasm-opt = false

[watch]
watch = ["src", "styles", "assets", "index.html"]
ignore = ["dist"]

[serve]
address = "127.0.0.1"
port = 8080
open = false
ws_protocol = "ws"

[[hooks]]
stage = "build"
command = "sh"
command_arguments = ["-c", "echo 'Building FOSSMeet 26 WASM app...'"]

